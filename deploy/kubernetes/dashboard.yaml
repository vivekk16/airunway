# KubeAIRunway Dashboard Deployment
# Deploy with: kubectl apply -f dashboard.yaml
#
# NOTE: Deploy controller.yaml first to install CRDs and the controller.
#
# This manifest creates:
# - ServiceAccount with RBAC permissions
# - Deployment running the KubeAIRunway dashboard server
# - Service for internal cluster access

---
# ServiceAccount for KubeAIRunway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeairunway
  namespace: kubeairunway-system
  labels:
    app.kubernetes.io/name: kubeairunway

---
# ClusterRole with permissions needed by KubeAIRunway
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeairunway
  labels:
    app.kubernetes.io/name: kubeairunway
rules:
  # Core API - Pods, Services (full CRUD for deployment management)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secrets and ConfigMaps (needed for HF tokens, config storage)
  - apiGroups: [""]
    resources:
      - secrets
      - configmaps
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Events (needed for deployment event display)
  - apiGroups: [""]
    resources:
      - events
    verbs: ["list", "watch"]

  # Namespaces (read + create)
  # REVIEW: Uncomment "delete" to enable provider uninstall features
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list", "watch", "create"]
    # verbs: ["get", "list", "watch", "create", "delete"]

  # Apps API - Deployments, ReplicaSets
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # KubeAIRunway CRDs - ModelDeployments
  - apiGroups: ["kubeairunway.ai"]
    resources:
      - modeldeployments
      - modeldeployments/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # KubeAIRunway CRDs - InferenceProviderConfigs (read + delete for uninstall)
  - apiGroups: ["kubeairunway.ai"]
    resources:
      - inferenceproviderconfigs
    verbs: ["get", "list", "watch", "delete"]

  # CRD management (needed for provider detection)
  # REVIEW: Uncomment "delete" to enable provider uninstall features
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list"]
    # verbs: ["get", "list", "delete"]

  # NVIDIA Dynamo CRDs
  - apiGroups: ["nvidia.com"]
    resources:
      - dynamographdeployments
      - dynamographdeployments/status
      - clusterpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # KubeRay CRDs
  - apiGroups: ["ray.io"]
    resources:
      - rayservices
      - rayservices/status
      - rayclusters
      - rayclusters/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Gateway API - Gateways and HTTPRoutes (read-only for status display)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
    verbs: ["get", "list", "watch"]

  # Gateway API Inference Extension - InferencePools (read-only for status display)
  - apiGroups: ["inference.networking.k8s.io"]
    resources:
      - inferencepools
    verbs: ["get", "list", "watch"]

  # Storage - for PVCs if needed
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]

  # Node info for GPU detection
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeairunway
  labels:
    app.kubernetes.io/name: kubeairunway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeairunway
subjects:
  - kind: ServiceAccount
    name: kubeairunway
    namespace: kubeairunway-system

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeairunway
  namespace: kubeairunway-system
  labels:
    app.kubernetes.io/name: kubeairunway
    app.kubernetes.io/instance: kubeairunway
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeairunway
      app.kubernetes.io/instance: kubeairunway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeairunway
        app.kubernetes.io/instance: kubeairunway
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: kubeairunway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: kubeairunway
          image: ghcr.io/kaito-project/kubeairunway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            # Server configuration
            - name: PORT
              value: "3001"
            - name: LOG_LEVEL
              value: "info"
            # Optional: Enable authentication
            # - name: AUTH_ENABLED
            #   value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
# Service - ClusterIP for internal access
apiVersion: v1
kind: Service
metadata:
  name: kubeairunway
  namespace: kubeairunway-system
  labels:
    app.kubernetes.io/name: kubeairunway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: kubeairunway
    app.kubernetes.io/instance: kubeairunway

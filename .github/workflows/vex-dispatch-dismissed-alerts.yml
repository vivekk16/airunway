name: Dispatch Dismissed Dependabot Alerts

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: Scan dismissed alerts updated in the last N hours
        required: false
        default: '168'
        type: string
      max_pages:
        description: Maximum Dependabot alert pages to scan (100 alerts per page)
        required: false
        default: '5'
        type: string
      alert_number:
        description: Optional dismissed Dependabot alert number to backfill directly
        required: false
        type: string
      ghsa_id:
        description: Optional GHSA ID to backfill from dismissed alerts without lookback filtering
        required: false
        type: string
      dry_run:
        description: Log candidate dispatches without triggering the VEX workflow
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: vex-dispatch-dismissed-alerts
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      DISPATCH_REF: ${{ github.ref_name }}
      DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
      GH_TOKEN: ${{ secrets.VEX_AUTOMATION_TOKEN }}
      LOOKBACK_HOURS_INPUT: ${{ github.event.inputs.lookback_hours }}
      MAX_PAGES_INPUT: ${{ github.event.inputs.max_pages }}
      REPO: ${{ github.repository }}
      TARGET_ALERT_NUMBER_INPUT: ${{ github.event.inputs.alert_number }}
      TARGET_GHSA_ID_INPUT: ${{ github.event.inputs.ghsa_id }}
      WORKFLOW_FILE: vex-generator.lock.yml
    steps:
      - name: Poll dismissed Dependabot alerts and dispatch the VEX workflow
        shell: bash
        run: |
          set -euo pipefail

          api() {
            gh api -H "Accept: application/vnd.github+json" "$@"
          }

          trim() {
            local value="${1:-}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          extract_vex_field() {
            local field="$1"
            local comment_text="${2:-}"

            awk -v field="$field" '
              BEGIN { in_vex=0 }
              /^[[:space:]]*VEX:[[:space:]]*$/ { in_vex=1; next }
              in_vex {
                if ($0 ~ /^[[:space:]]*$/) {
                  exit
                }

                line = $0
                sub(/^[[:space:]]*/, "", line)

                if (line !~ /^[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*/) {
                  exit
                }

                key = line
                sub(/:.*/, "", key)
                value = line
                sub(/^[^:]+:[[:space:]]*/, "", value)

                if (key == field) {
                  print value
                  exit
                }
              }
            ' <<<"$comment_text"
          }

          is_valid_vex_justification() {
            case "$1" in
              component_not_present|\
              vulnerable_code_not_present|\
              vulnerable_code_not_in_execute_path|\
              vulnerable_code_cannot_be_controlled_by_adversary|\
              inline_mitigations_already_exist)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::VEX_AUTOMATION_TOKEN is not configured."
            exit 1
          fi

          lookback_hours="${LOOKBACK_HOURS_INPUT:-168}"
          max_pages="${MAX_PAGES_INPUT:-5}"
          dry_run="${DRY_RUN_INPUT:-false}"
          default_branch="${DEFAULT_BRANCH:-$DISPATCH_REF}"
          dispatch_ref="${DISPATCH_REF:-$default_branch}"
          target_alert_number="$(trim "${TARGET_ALERT_NUMBER_INPUT:-}")"
          target_ghsa_id="$(trim "${TARGET_GHSA_ID_INPUT:-}")"
          target_ghsa_id="$(printf '%s' "$target_ghsa_id" | tr '[:upper:]' '[:lower:]')"

          case "$lookback_hours" in
            ''|*[!0-9]*)
              echo "::error::lookback_hours must be a non-negative integer."
              exit 1
              ;;
          esac

          case "$max_pages" in
            ''|*[!0-9]*)
              echo "::error::max_pages must be a positive integer."
              exit 1
              ;;
          esac

          if [ "$max_pages" -eq 0 ]; then
            echo "::error::max_pages must be greater than zero."
            exit 1
          fi

          if [ "$dry_run" != "true" ] && [ "$dry_run" != "false" ]; then
            echo "::error::dry_run must resolve to true or false."
            exit 1
          fi

          case "$target_alert_number" in
            '')
              ;;
            *[!0-9]*)
              echo "::error::alert_number must be a positive integer when provided."
              exit 1
              ;;
          esac

          if [ -n "$target_alert_number" ]; then
            scan_mode="alert_number"
          elif [ -n "$target_ghsa_id" ]; then
            scan_mode="ghsa_id"
          else
            scan_mode="lookback"
          fi

          if [ "$scan_mode" = "lookback" ]; then
            cutoff="$(date -u -d "$lookback_hours hours ago" +"%Y-%m-%dT%H:%M:%SZ")"
          else
            cutoff=""
          fi

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT

          recent_alerts_jsonl="$tmpdir/recent-alerts.jsonl"
          ambiguous_ghsas_file="$tmpdir/ambiguous-ghsas.txt"
          open_vex_prs_json="$tmpdir/open-vex-prs.json"
          open_vex_pr_files="$tmpdir/open-vex-pr-files.tsv"
          summary_rows_file="$tmpdir/summary-rows.md"
          supported_vex_justifications="component_not_present, vulnerable_code_not_present, vulnerable_code_not_in_execute_path, vulnerable_code_cannot_be_controlled_by_adversary, inline_mitigations_already_exist"

          : > "$recent_alerts_jsonl"
          : > "$ambiguous_ghsas_file"
          : > "$open_vex_pr_files"
          : > "$summary_rows_file"

          recent_alert_count=0
          dispatched_count=0
          skipped_count=0
          dry_run_count=0

          append_summary_row() {
            local outcome="$1"
            local alert_ref="$2"
            local ghsa_ref="$3"
            local detail="$4"

            printf '| %s | %s | %s | %s |\n' \
              "$outcome" \
              "${alert_ref:-n/a}" \
              "${ghsa_ref:-n/a}" \
              "${detail:-n/a}" \
              >> "$summary_rows_file"
          }

          emit_summary() {
            if [ -z "${GITHUB_STEP_SUMMARY:-}" ]; then
              return 0
            fi

            {
              echo "## Dependabot VEX Dispatch"
              echo ""
              case "$scan_mode" in
                alert_number)
                  echo "- Mode: targeted alert backfill"
                  echo "- Alert number: #$target_alert_number"
                  if [ -n "$target_ghsa_id" ]; then
                    echo "- GHSA filter: $target_ghsa_id"
                  fi
                  ;;
                ghsa_id)
                  echo "- Mode: targeted GHSA backfill"
                  echo "- GHSA filter: $target_ghsa_id"
                  echo "- Max pages scanned: $max_pages"
                  ;;
                *)
                  echo "- Mode: lookback scan"
                  echo "- Lookback hours: $lookback_hours"
                  echo "- Cutoff: $cutoff"
                  echo "- Max pages scanned: $max_pages"
                  ;;
              esac
              echo "- Default branch: $default_branch"
              echo "- Dispatch ref: $dispatch_ref"
              echo "- Dry run: $dry_run"
              echo ""
              echo "| Outcome | Alert | GHSA | Detail |"
              echo "|---|---|---|---|"
              if [ -s "$summary_rows_file" ]; then
                cat "$summary_rows_file"
              else
                echo "| none | - | - | No matching dismissed alerts were processed. |"
              fi
              echo ""
              echo "- Alerts considered: $recent_alert_count"
              echo "- Alerts skipped: $skipped_count"
              echo "- Dry-run dispatches: $dry_run_count"
              echo "- Workflow dispatches created: $dispatched_count"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          echo "Scanning dismissed Dependabot alerts for $REPO"
          echo "Scan mode: $scan_mode"
          if [ "$scan_mode" = "lookback" ]; then
            echo "Cutoff: $cutoff"
          else
            echo "Target alert number: ${target_alert_number:-<none>}"
            echo "Target GHSA: ${target_ghsa_id:-<none>}"
          fi
          echo "Default branch: $default_branch"
          echo "Dispatch ref: $dispatch_ref"
          echo "Dry run: $dry_run"

          if [ "$scan_mode" = "alert_number" ]; then
            echo "Fetching dismissed alert #$target_alert_number"
            if target_alert_json="$(api --method GET "repos/$REPO/dependabot/alerts/$target_alert_number" 2>/dev/null)"; then
              target_alert_state="$(jq -r '.state // ""' <<<"$target_alert_json")"
              fetched_ghsa_id="$(jq -r '.security_advisory.ghsa_id // ""' <<<"$target_alert_json")"
              fetched_ghsa_id_normalized="$(printf '%s' "$fetched_ghsa_id" | tr '[:upper:]' '[:lower:]')"

              if [ "$target_alert_state" != "dismissed" ]; then
                echo "Requested alert #$target_alert_number is in state '$target_alert_state', not dismissed."
                append_summary_row "skipped" "#$target_alert_number" "${fetched_ghsa_id:-n/a}" "requested alert is not dismissed"
                emit_summary
                exit 0
              fi

              if [ -n "$target_ghsa_id" ] && [ "$fetched_ghsa_id_normalized" != "$target_ghsa_id" ]; then
                echo "::error::alert_number #$target_alert_number does not match ghsa_id $target_ghsa_id."
                append_summary_row "error" "#$target_alert_number" "${fetched_ghsa_id:-n/a}" "alert_number and ghsa_id filters do not match"
                emit_summary
                exit 1
              fi

              printf '%s\n' "$target_alert_json" >> "$recent_alerts_jsonl"
            else
              echo "::warning::Dependabot alert #$target_alert_number was not found."
              append_summary_row "skipped" "#$target_alert_number" "${target_ghsa_id:-n/a}" "requested alert was not found"
              emit_summary
              exit 0
            fi
          else
            for page in $(seq 1 "$max_pages"); do
              echo "Fetching dismissed alert page $page"

              page_json="$(api --method GET "repos/$REPO/dependabot/alerts" \
                -f state="dismissed" \
                -f sort="updated" \
                -f direction="desc" \
                -F per_page=100 \
                -F page="$page")"

              page_count="$(jq 'length' <<<"$page_json")"

              if [ "$page_count" -eq 0 ]; then
                echo "No more dismissed alerts returned."
                break
              fi

              if [ "$scan_mode" = "ghsa_id" ]; then
                jq -c --arg target_ghsa_id "$target_ghsa_id" '
                  map(select(((.security_advisory.ghsa_id // "") | ascii_downcase) == $target_ghsa_id))
                  | .[]
                ' <<<"$page_json" >> "$recent_alerts_jsonl"
              else
                jq -c --arg cutoff "$cutoff" '
                  map(select((.updated_at // "") >= $cutoff))
                  | .[]
                ' <<<"$page_json" >> "$recent_alerts_jsonl"

                oldest_updated_at="$(jq -r '.[-1].updated_at // ""' <<<"$page_json")"
                if [[ -z "$oldest_updated_at" || "$oldest_updated_at" < "$cutoff" ]]; then
                  echo "Reached alerts older than the lookback window on page $page."
                  break
                fi
              fi
            done
          fi

          recent_alert_count="$(wc -l < "$recent_alerts_jsonl" | tr -d ' ')"
          if [ "$recent_alert_count" -eq 0 ]; then
            if [ "$scan_mode" = "ghsa_id" ]; then
              echo "No dismissed alerts matched GHSA $target_ghsa_id in the scanned pages."
              append_summary_row "skipped" "-" "$target_ghsa_id" "no matching dismissed alerts found in scanned pages; increase max_pages to search further back"
            else
              echo "No dismissed alerts found inside the selected search scope."
              append_summary_row "none" "-" "${target_ghsa_id:-n/a}" "no dismissed alerts found inside the selected search scope"
            fi
            emit_summary
            exit 0
          fi

          jq -sr '
            map(
              select(
                (.security_advisory.ghsa_id // "") != "" and
                (.dependency.manifest_path // "") != ""
              )
            )
            | group_by(.security_advisory.ghsa_id)
            | map(
                select(([.[].dependency.manifest_path] | unique | length) > 1)
                | .[0].security_advisory.ghsa_id
              )
            | .[]
          ' "$recent_alerts_jsonl" > "$ambiguous_ghsas_file"

          api --method GET "search/issues" \
            -f q="repo:$REPO is:pr is:open label:vex" \
            -F per_page=100 > "$open_vex_prs_json"

          mapfile -t open_vex_pr_numbers < <(jq -r '.items[].number' "$open_vex_prs_json")
          for pr_number in "${open_vex_pr_numbers[@]}"; do
            api --method GET "repos/$REPO/pulls/$pr_number/files" -F per_page=100 \
              | jq -r --arg pr_number "$pr_number" '.[] | [$pr_number, .filename] | @tsv' \
              >> "$open_vex_pr_files"
          done

          while IFS= read -r alert_json; do
            alert_number="$(jq -r '.number' <<<"$alert_json")"
            ghsa_id="$(jq -r '.security_advisory.ghsa_id // ""' <<<"$alert_json")"
            cve_id="$(jq -r '.security_advisory.cve_id // ""' <<<"$alert_json")"
            manifest_path="$(jq -r '.dependency.manifest_path // ""' <<<"$alert_json")"
            manifest_path="${manifest_path#/}"
            vulnerable_package_name="$(jq -r '.dependency.package.name // .security_vulnerability.package.name // ""' <<<"$alert_json")"
            vulnerable_package_ecosystem="$(jq -r '.dependency.package.ecosystem // .security_vulnerability.package.ecosystem // ""' <<<"$alert_json")"
            severity="$(jq -r '(.security_vulnerability.severity // .security_advisory.severity // "") | ascii_downcase' <<<"$alert_json")"
            summary="$(jq -r '.security_advisory.summary // ""' <<<"$alert_json")"
            dismissed_reason="$(jq -r '.dismissed_reason // ""' <<<"$alert_json")"
            dismissed_comment="$(jq -r '.dismissed_comment // ""' <<<"$alert_json")"
            dismissed_at="$(jq -r '.dismissed_at // ""' <<<"$alert_json")"
            alert_url="$(jq -r '.html_url // .url // ""' <<<"$alert_json")"
            vex_status="$(extract_vex_field status "$dismissed_comment" | tr '[:upper:]' '[:lower:]')"
            vex_status="$(trim "$vex_status")"
            vex_justification="$(extract_vex_field justification "$dismissed_comment" | tr '[:upper:]' '[:lower:]')"
            vex_justification="$(trim "$vex_justification")"
            vex_impact_statement="$(extract_vex_field impact_statement "$dismissed_comment")"
            if [ -z "$vex_impact_statement" ]; then
              vex_impact_statement="$(extract_vex_field impact "$dismissed_comment")"
            fi
            vex_impact_statement="$(trim "$vex_impact_statement")"

            skip_reason=""

            if [ "$dismissed_reason" = "no_bandwidth" ]; then
              skip_reason="no_bandwidth"
            elif [ -z "$vex_status" ] && [ -z "$vex_justification" ] && [ -z "$vex_impact_statement" ]; then
              if [ "$dismissed_reason" = "tolerable_risk" ]; then
                skip_reason="tolerable_risk_requires_explicit_vex_metadata"
              else
                skip_reason="missing_explicit_vex_metadata"
              fi
            elif [ -z "$vex_status" ] || [ -z "$vex_justification" ] || [ -z "$vex_impact_statement" ]; then
              skip_reason="incomplete_explicit_vex_metadata"
            elif [ "$vex_status" != "not_affected" ]; then
              skip_reason="unsupported_vex_status"
            elif ! is_valid_vex_justification "$vex_justification"; then
              skip_reason="invalid_vex_justification"
            elif [ -z "$ghsa_id" ]; then
              skip_reason="missing_ghsa_id"
            elif [ -z "$manifest_path" ]; then
              skip_reason="missing_manifest_path"
            elif grep -Fxq "$ghsa_id" "$ambiguous_ghsas_file"; then
              skip_reason="ambiguous_same_ghsa_multiple_manifests"
            elif [ -z "$vulnerable_package_name" ] || [ -z "$vulnerable_package_ecosystem" ]; then
              skip_reason="missing_vulnerability_context"
            elif [ -z "$severity" ] || [ -z "$summary" ]; then
              skip_reason="missing_advisory_metadata"
            elif ! api --method GET "repos/$REPO/contents/$manifest_path" -f ref="$default_branch" >/dev/null 2>&1; then
              skip_reason="manifest_missing_on_default_branch"
            elif api --method GET "repos/$REPO/contents/.vex/$ghsa_id.json" -f ref="$default_branch" >/dev/null 2>&1; then
              skip_reason="vex_file_already_exists"
            elif jq -e --arg ghsa_id "$ghsa_id" '
              any(.items[]?; (.title // "" | contains($ghsa_id)) or (.body // "" | contains($ghsa_id)))
            ' "$open_vex_prs_json" >/dev/null 2>&1; then
              skip_reason="open_vex_pr_mentions_ghsa"
            elif grep -Fq $'\t''.vex/'"$ghsa_id"'.json' "$open_vex_pr_files"; then
              skip_reason="open_vex_pr_already_updates_file"
            fi

            if [ -n "$skip_reason" ]; then
              echo "Skipping alert #$alert_number (${ghsa_id:-unknown}): $skip_reason"
              append_summary_row "skipped" "#$alert_number" "${ghsa_id:-n/a}" "$skip_reason"
              if [ "$skip_reason" = "missing_explicit_vex_metadata" ] || \
                 [ "$skip_reason" = "incomplete_explicit_vex_metadata" ] || \
                 [ "$skip_reason" = "tolerable_risk_requires_explicit_vex_metadata" ] || \
                 [ "$skip_reason" = "unsupported_vex_status" ] || \
                 [ "$skip_reason" = "invalid_vex_justification" ]; then
                echo "Expected dismissal comment format:"
                echo "VEX:"
                echo "status: not_affected"
                echo "justification: <openvex-justification>"
                echo "impact: <maintainer-reviewed impact statement>"
                echo "Allowed justifications for not_affected: $supported_vex_justifications"
              fi
              skipped_count=$((skipped_count + 1))
              continue
            fi

            payload_file="$tmpdir/dispatch-$alert_number.json"
            jq -n \
              --arg ref "$dispatch_ref" \
              --arg alert_number "$alert_number" \
              --arg ghsa_id "$ghsa_id" \
              --arg cve_id "$cve_id" \
              --arg vulnerable_package_name "$vulnerable_package_name" \
              --arg vulnerable_package_ecosystem "$vulnerable_package_ecosystem" \
              --arg severity "$severity" \
              --arg summary "$summary" \
              --arg manifest_path "$manifest_path" \
              --arg dismissed_reason "$dismissed_reason" \
              --arg dismissed_comment "$dismissed_comment" \
              --arg alert_url "$alert_url" \
              --arg dismissed_at "$dismissed_at" \
              --arg vex_status "$vex_status" \
              --arg vex_justification "$vex_justification" \
              --arg vex_impact_statement "$vex_impact_statement" \
              '{
                ref: $ref,
                inputs: {
                  alert_number: $alert_number,
                  ghsa_id: $ghsa_id,
                  cve_id: $cve_id,
                  vulnerable_package_name: $vulnerable_package_name,
                  vulnerable_package_ecosystem: $vulnerable_package_ecosystem,
                  severity: $severity,
                  summary: $summary,
                  manifest_path: $manifest_path,
                  dismissed_reason: $dismissed_reason,
                  dismissed_comment: $dismissed_comment,
                  alert_url: $alert_url,
                  dismissed_at: $dismissed_at,
                  vex_status: $vex_status,
                  vex_justification: $vex_justification,
                  vex_impact_statement: $vex_impact_statement
                }
              }' > "$payload_file"

            if [ "$dry_run" = "true" ]; then
              echo "Dry run: would dispatch $WORKFLOW_FILE for alert #$alert_number ($ghsa_id)"
              jq . "$payload_file"
              append_summary_row "dry_run" "#$alert_number" "${ghsa_id:-n/a}" "would dispatch $WORKFLOW_FILE"
              dry_run_count=$((dry_run_count + 1))
              continue
            fi

            echo "Dispatching $WORKFLOW_FILE for alert #$alert_number ($ghsa_id)"
            api --method POST "repos/$REPO/actions/workflows/$WORKFLOW_FILE/dispatches" \
              --input "$payload_file"
            append_summary_row "dispatched" "#$alert_number" "${ghsa_id:-n/a}" "$WORKFLOW_FILE"
            dispatched_count=$((dispatched_count + 1))
          done < "$recent_alerts_jsonl"

          echo "Recent alerts scanned: $recent_alert_count"
          echo "Alerts skipped: $skipped_count"
          echo "Dry-run dispatches: $dry_run_count"
          echo "Workflow dispatches created: $dispatched_count"
          emit_summary
